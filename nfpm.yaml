# nfpm.yaml
name: "geforcenow-presence"
arch: "amd64"
platform: "linux"
version: "${VERSION}"
section: "utils"
priority: "optional"
maintainer: "Josh McKinney <josh@joshmckinney.com>"
description: "GeForce NOW Discord Rich Presence for Linux"
vendor: "Josh McKinney"
homepage: "https://github.com/joshmckinney/geforcenow-presence"
license: "MIT"

contents:
  - src: "geforcenow-presence"
    dst: "/usr/bin/geforcenow-presence"
  - src: "config/app_settings.json"
    dst: "/etc/geforcenow-presence/app_settings.json"
    type: "config"
  - src: "lang/"
    dst: "/usr/share/geforcenow-presence/lang/"
  - src: "gnome-extension/extension.js"
    dst: "/usr/share/gnome-shell/extensions/window-title-server@geforcenow-presence/extension.js"
  - src: "gnome-extension/metadata.json"
    dst: "/usr/share/gnome-shell/extensions/window-title-server@geforcenow-presence/metadata.json"
  - src: "build/package/geforcenow-presence.service"
    dst: "/usr/lib/systemd/user/geforcenow-presence.service"
  - src: "build/package/geforcenow-presence.desktop"
    dst: "/usr/share/applications/geforcenow-presence.desktop"

overrides:
  rpm:
    depends:
      - libayatana-appindicator-gtk3
      - zenity
      - xdg-utils
  deb:
    depends:
      - libayatana-appindicator3-1
      - zenity
      - xdg-utils

scripts:
  postinstall: build/package/postinstall.sh
  preremove: build/package/preremove.sh
